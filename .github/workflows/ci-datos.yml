name: DB CI/CD — Build, Push ECR, Deploy EC2

on:
  push:
    branches: ['**']

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: juegos-datos

permissions:
  contents: write

jobs:

  versioning:
    name: Semantic Version (v1.x.0)
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.calc.outputs.new_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calcular y crear tag
        id: calc
        run: |
          LAST=$(git tag --list 'v1.*' --sort=-v:refname | head -1)
          if [ -z "$LAST" ]; then
            NEW="v1.0.0"
          else
            MINOR=$(echo $LAST | cut -d. -f2)
            NEW="v1.$((MINOR + 1)).0"
          fi
          echo "Último: ${LAST:-ninguno} → Nuevo: $NEW"
          echo "new_tag=$NEW" >> $GITHUB_OUTPUT
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $NEW
          git push origin $NEW

  build-push-ecr:
    name: Build & Push ECR (${{ needs.versioning.outputs.new_tag }})
    runs-on: ubuntu-latest
    needs: versioning

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build y push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ needs.versioning.outputs.new_tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Resumen
        run: |
          echo "### Imagen DB publicada en ECR" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** \`${{ needs.versioning.outputs.new_tag }}\`" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy EC2-Datos via SSM
    runs-on: ubuntu-latest
    needs: build-push-ecr

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Leer Instance ID de EC2-Datos desde Parameter Store
        id: get-instance
        run: |
          EC2_DATOS=$(aws ssm get-parameter \
            --name "/juegos/ec2/datos" \
            --query "Parameter.Value" \
            --output text)
          echo "instance_id=$EC2_DATOS" >> $GITHUB_OUTPUT
          echo "EC2-Datos: $EC2_DATOS"

      - name: Enviar deploy via SSM
        id: ssm-cmd
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.get-instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["sudo /home/ec2-user/deploy-datos.sh"]}' \
            --comment "Deploy DB ${{ needs.versioning.outputs.new_tag }}" \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$CMD_ID" >> $GITHUB_OUTPUT
          echo "SSM Command ID: $CMD_ID"

      - name: Esperar resultado (máx 5 min)
        run: |
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${{ steps.ssm-cmd.outputs.command_id }}" \
              --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "Intento $i/30 — $STATUS"
            if [ "$STATUS" = "Success" ]; then
              aws ssm get-command-invocation \
                --command-id "${{ steps.ssm-cmd.outputs.command_id }}" \
                --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                --query "StandardOutputContent" --output text
              exit 0
            fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id "${{ steps.ssm-cmd.outputs.command_id }}" \
                --instance-id "${{ steps.get-instance.outputs.instance_id }}" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 10
          done
          exit 1

      - name: Resumen del deploy
        if: success()
        run: |
          echo "### Deploy DB completado" >> $GITHUB_STEP_SUMMARY
          echo "- **Versión:** \`${{ needs.versioning.outputs.new_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **EC2-Datos:** \`${{ steps.get-instance.outputs.instance_id }}\`" >> $GITHUB_STEP_SUMMARY
